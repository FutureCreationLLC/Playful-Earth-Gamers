<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | PEG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.5); }
        .login-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .input-box { background: #f0f2f5; border-radius: 15px; padding: 15px; border: 2px solid transparent; }
        .input-box:focus-within { border-color: #a855f7; }
        .btn-gradient { background: linear-gradient(135deg, #f472b6 0%, #a855f7 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-top-view-of-a-keyboard-with-purple-backlight-34559-large.mp4" type="video/mp4">
    </video>

    <div class="login-card">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Welcome Back!</h1>
            <p class="text-sm text-gray-400">Login to continue</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div class="input-box flex items-center gap-3">
                <i class="fa-regular fa-user text-gray-400"></i>
                <input type="email" id="l-email" required placeholder="Email" class="bg-transparent outline-none w-full text-sm">
            </div>
            <div class="input-box flex items-center gap-3">
                <i class="fa-solid fa-lock text-gray-400"></i>
                <input type="password" id="l-password" required placeholder="Password" class="bg-transparent outline-none w-full text-sm">
            </div>

            <button type="submit" id="l-btn" class="w-full py-4 rounded-2xl text-white font-bold btn-gradient shadow-lg transition-all hover:scale-[1.02]">
                Login
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-gray-500">
            Don't have an account? <a href="Register.html" class="text-purple-600 font-bold">Sign Up</a>
        </p>
    </div>

    <script>
        // FIREBASE CONFIG (Same as Register)
        const firebaseConfig = { ... }; 
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('l-btn');
            btn.innerText = "Verifying...";

            try {
                const cred = await auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-password').value);
                const doc = await db.collection("users").doc(cred.user.uid).get();

                if (doc.exists && doc.data().paidMember === true) {
                    window.location.href = "index.html";
                } else {
                    alert("Account found but membership fee is unpaid.");
                    await auth.signOut();
                    window.location.href = "Register.html";
                }
            } catch (err) { alert(err.message); btn.innerText = "Login"; }
        });
    </script>
</body>
</html>
