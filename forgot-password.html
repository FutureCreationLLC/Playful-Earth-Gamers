<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Playful Earth Gamers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; overflow: hidden; background: #f3e8ff; }
        
        /* --- VIDEO BACKGROUND --- */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.85);
        }

        /* --- CLAYMORPHISM CARD --- */
        .clay-card {
            background: #ffffff;
            border-radius: 50px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.1), -10px -10px 40px rgba(255,255,255,0.8);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            margin-top: 100px;
            position: relative;
        }

        /* --- MASCOT POSITIONING --- */
        .mascot-top {
            position: absolute;
            top: -140px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            z-index: 20;
            pointer-events: none;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));
        }

        /* --- SOFT INPUTS --- */
        .clay-input {
            background: #f8f6ff;
            border-radius: 20px;
            box-shadow: inset 4px 4px 8px #d1d1d1, inset -4px -4px 8px #ffffff;
            border: none;
            outline: none;
            transition: 0.3s;
        }
        .clay-input:focus {
            box-shadow: inset 2px 2px 4px #d1d1d1, inset -2px -2px 4px #ffffff, 0 0 0 2px #c084fc;
        }

        /* --- GRADIENT BUTTON --- */
        .btn-grad {
            background: linear-gradient(90deg, #ff99ac 0%, #a78bfa 100%);
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(167, 139, 250, 0.3);
            transition: 0.3s;
        }
        .btn-grad:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(167, 139, 250, 0.4);
        }

        /* --- STATUS MESSAGES --- */
        #message-box {
            display: none;
            border-radius: 15px;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Background Video -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="assets/videos/welcome-bg.mp4" type="video/mp4">
    </video>

    <div class="relative w-full max-w-[420px] flex flex-col items-center">
        <!-- Mascot Image -->
        <img src="assets/logo/peg-avatar.png" class="mascot-top">

        <!-- Reset Card -->
        <div class="clay-card relative">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Lost Your Way?</h1>
                <p class="text-gray-400 text-sm mt-1">Enter your email to reset password</p>
            </div>

            <!-- Status Message Area -->
            <div id="message-box"></div>

            <form id="reset-form" class="space-y-6">
                <!-- Email Input -->
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="email" id="email" placeholder="Email Address" required 
                        class="clay-input w-full py-4 pl-12 pr-4 font-bold text-gray-700">
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="btn-grad w-full py-4 text-white font-black text-lg uppercase tracking-widest transition">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-10 text-center">
                <p class="text-sm font-bold text-gray-500">
                    Remembered? <a href="login.html" class="text-purple-600 hover:underline">Back to Login</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        // Use your existing config
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const resetForm = document.getElementById('reset-form');
        const msgBox = document.getElementById('message-box');
        const submitBtn = document.getElementById('submit-btn');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Update UI to loading
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;
            msgBox.style.display = "none";

            try {
                await sendPasswordResetEmail(auth, email);
                
                // Show Success
                msgBox.innerText = "Reset link sent! Check your inbox.";
                msgBox.className = "success";
                msgBox.style.display = "block";
                submitBtn.innerText = "Sent!";
                
            } catch (error) {
                // Show Error
                msgBox.innerText = "Error: " + error.message;
                msgBox.className = "error";
                msgBox.style.display = "block";
                submitBtn.innerText = "Try Again";
                submitBtn.disabled = false;
            }
        });
    </script>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
