<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>PEG | My Global Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a0f; color: #fff; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.2); }
        .glass-card { background: rgba(10, 19, 28, 0.85); border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; }
    </style>
</head>
<body class="p-10 flex flex-col items-center">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-software-developer-working-on-a-code-34563-large.mp4" type="video/mp4">
    </video>

    <div class="max-w-6xl w-full space-y-10">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <a href="index.html" class="text-green-500 font-bold uppercase text-xs">← Back to Arena</a>
            <h1 class="text-xl font-gamer tracking-widest text-gray-500 uppercase">My Profile</h1>
        </div>

        <!-- Row 1: Identity & Financials -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-card p-12 flex items-center gap-12">
                <img src="https://ui-avatars.com/api/?name=User&background=00ff88&color=000" class="w-32 h-32 rounded-full border-4 border-green-500 shadow-[0_0_20px_#00ff88]">
                <div class="flex-1">
                    <h2 class="text-5xl font-bold mb-2">Member <i class="fa-solid fa-circle-check text-green-500"></i></h2>
                    <p class="text-green-500 font-bold text-xs uppercase tracking-widest">Verified Global Founder</p>
                </div>
            </div>
            <div class="glass-card p-12 flex flex-col justify-between">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-widest">Global Balance</p>
                <p class="text-5xl font-black text-green-500">$1,250.00</p>
                <button class="w-full py-4 bg-blue-600 rounded-2xl text-[10px] font-bold uppercase">Manage Funds</button>
            </div>
        </div>

        <!-- Row 2: Performance Columns -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-card p-8 text-center"><p class="text-4xl font-black mb-2">128</p><p class="text-[10px] text-gray-500 uppercase font-black">Wins</p></div>
            <div class="glass-card p-8 text-center"><p class="text-4xl font-black mb-2 text-purple-500">72%</p><p class="text-[10px] text-gray-500 uppercase font-black">Rate</p></div>
            <div class="glass-card p-8 text-center"><p class="text-4xl font-black mb-2">342</p><p class="text-[10px] text-gray-500 uppercase font-black">Challenges</p></div>
            <div class="glass-card p-8 text-center"><p class="text-4xl font-black mb-2 text-green-500">$3,450</p><p class="text-[10px] text-gray-500 uppercase font-black">Earned</p></div>
        </div>

        <!-- Row 3: Quick Navigation -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="index.html" class="glass-card p-10 flex items-center gap-6 hover:bg-white/5 transition-all">
                <i class="fa-solid fa-trophy text-green-500 text-xl"></i>
                <div><h4 class="font-bold">Tournament Hub</h4><p class="text-[10px] text-gray-500">Browse Live Games</p></div>
            </a>
            <a href="support.html" class="glass-card p-10 flex items-center gap-6 hover:bg-white/5 transition-all">
                <i class="fa-solid fa-headset text-blue-400 text-xl"></i>
                <div><h4 class="font-bold">24/7 Support</h4><p class="text-[10px] text-gray-500">Global Help Desk</p></div>
            </a>
            <a href="terms.html" class="glass-card p-10 flex items-center gap-6 hover:bg-white/5 transition-all">
                <i class="fa-solid fa-shield-halved text-purple-400 text-xl"></i>
                <div><h4 class="font-bold">Legal & Security</h4><p class="text-[10px] text-gray-500">Terms of Service</p></div>
            </a>
        </div>
    </div>
</body>
</html>
