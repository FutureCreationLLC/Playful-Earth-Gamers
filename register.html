<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Arena | PEG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SDKs -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-circuit-board-lights-background-9080-large.mp4" type="video/mp4">
    </video>

    <!-- PAYSTACK TRUST BANNER -->
    <div class="w-full bg-white py-6 flex flex-col items-center justify-center border-b-4 border-cyan-500 z-50">
        <img src="https://paystack.com/assets/img/login/paystack-logo.svg" alt="Paystack" class="h-10 mb-2">
        <div class="flex items-center gap-2">
            <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-lock"></i> Secure Payment Provided
            </div>
        </div>
    </div>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md glass rounded-[2.5rem] p-10">
            <div class="text-center mb-8">
                <h2 class="font-gamer text-2xl text-cyan-400 mb-2 uppercase">Create Account</h2>
                <p class="text-gray-400 text-sm">One-time $1 early membership fee</p>
            </div>

            <form id="regForm" class="space-y-5">
                <input type="text" id="fullname" required placeholder="Full Name" class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all">
                <input type="email" id="email" required placeholder="Email Address" class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all">
                <input type="password" id="password" required placeholder="Password" class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all">
                
                <button type="submit" id="payBtn" class="w-full py-5 rounded-2xl bg-gradient-to-r from-cyan-500 to-green-500 text-black font-gamer font-bold hover:scale-105 transition-all uppercase mt-4">
                    Pay $1 & Register
                </button>
            </form>
        </div>
    </main>

    <script>
        // FIREBASE CONFIG (Replace with your actual keys)
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            // PAYSTACK INTEGRATION
            let handler = PaystackPop.setup({
                key: 'YOUR_PAYSTACK_PUBLIC_KEY', // Replace with your Public Key
                email: email,
                amount: 100 * 1550, // $1 converted to your local currency (e.g. 1550 NGN)
                currency: "NGN",
                callback: function(response) {
                    processRegistration(response.reference);
                }
            });
            handler.openIframe();
        });

        async function processRegistration(ref) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection("users").doc(userCredential.user.uid).set({
                    fullname: fullname,
                    email: email,
                    paidMember: true,
                    payRef: ref,
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                window.location.href = "index.html";
            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
